<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songo - Partie locale</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #2c3e50;
            text-align: center;
            padding: 20px;
            color: white;
        }
        .board {
            display: inline-block;
            background: #5d4037;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .row {
            display: flex;
            justify-content: center;
        }
        .cell {
            width: 70px;
            height: 70px;
            background: #f5e6c4;
            border: 2px solid #8d6e63;
            margin: 5px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #3e2723;
            cursor: pointer;
            transition: 0.1s linear;
        }
        .cell:hover {
            background: #ffecb3;
            transform: scale(1.05);
        }
        .north .cell {
            background: #bcaaa4;
        }
        .south .cell {
            background: #d7ccc8;
        }
        .info {
            margin-top: 30px;
            background: #1e2a36;
            padding: 15px;
            border-radius: 15px;
            display: inline-block;
            width: 80%;
        }
        button {
            background: #f39c12;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
        }
        button:hover {
            background: #e67e22;
        }
        .scores {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        .message {
            font-size: 1.1rem;
            margin: 10px;
            padding: 8px;
            background: #00000088;
            border-radius: 10px;
        }
        a {
            color: #f9d56e;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>🎯 Songo - Version locale (2 joueurs)</h1>
    <div class="scores">
        <span>🏁 Joueur Nord : <span id="scoreNord">0</span> graines</span>
        <span>🏁 Joueur Sud : <span id="scoreSud">0</span> graines</span>
    </div>
    <div class="board">
        <div class="row north" id="northRow"></div>
        <div class="row south" id="southRow"></div>
    </div>
    <div class="info">
        <div class="message" id="turnMsg">Tour du Joueur Nord (cliquez sur une case de votre rangée)</div>
        <div class="message" id="infoMsg"></div>
        <button id="resetBtn">🔄 Nouvelle partie</button>
        <button id="homeBtn">🏠 Accueil</button>
    </div>

    <script src="songo.js"></script>
</body>
</html>
